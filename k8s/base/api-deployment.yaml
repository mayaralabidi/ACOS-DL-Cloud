apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: checkout-sa
      containers:
        - name: api
          image: REGION-docker.pkg.dev/checkout-dev/checkout/api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: checkout-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: checkout-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
