apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-config
  namespace: prod
data:
  APP_ENV:                    "prod"
  APP_VERSION:                "1.0.0"
  LOG_LEVEL:                  "INFO"
  GCP_PROJECT_ID:             "checkout-prod"
  GCS_BUCKET_NAME:            "checkout-models-prod"
  GCS_MODEL_PATH:             "yolo11m/v1/best.pt"
  MODEL_VERSION:              "v1"
  CONF_THRESHOLD:             "0.40"
  DETECTION_FLOOR:            "0.20"
  MIN_CONFIRM_FRAMES:         "6"
  NMS_IOU_THRESHOLD:          "0.20"
  NMS_FAMILY_IOU_THRESHOLD:   "0.10"
  CLUSTER_DIST_THRESHOLD:     "80.0"
  FRAME_SKIP:                 "1"
  CORS_ORIGINS:               "http://localhost:5173,http://frontend-service"
