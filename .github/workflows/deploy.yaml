name: Build and deploy

on:
  push:
    branches: [dev, staging, main]

env:
  REGION: us-central1-a
  CLUSTER_NAME: acos-dl-cloud-cluster
  PROJECT_ID: acos-dl

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet
      - name: Build and push API image
        run: |
          IMAGE=gcr.io/${{ env.PROJECT_ID }}/checkout-backend
          docker build -t $IMAGE:${{ steps.sha.outputs.sha }} -t $IMAGE:latest -f api/Dockerfile .
          docker push $IMAGE:${{ steps.sha.outputs.sha }}
          docker push $IMAGE:latest
      - name: Build and push frontend image
        run: |
          IMAGE=gcr.io/${{ env.PROJECT_ID }}/checkout-frontend
          docker build -t $IMAGE:${{ steps.sha.outputs.sha }} -t $IMAGE:latest \
            --build-arg VITE_API_BASE_URL=${{ secrets.DEV_API_URL }} \
            frontend/
          docker push $IMAGE:${{ steps.sha.outputs.sha }}
          docker push $IMAGE:latest

  deploy-dev:
    needs: build
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Apply manifests
        run: kubectl apply -k k8s/overlays/dev
      - name: Update image tags
        run: |
          SHA=${{ needs.build.outputs.sha }}
          kubectl set image deployment/api api=gcr.io/${{ env.PROJECT_ID }}/checkout-backend:$SHA -n dev
          kubectl set image deployment/frontend frontend=gcr.io/${{ env.PROJECT_ID }}/checkout-frontend:$SHA -n dev
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api -n dev --timeout=5m
          kubectl rollout status deployment/frontend -n dev --timeout=5m

  deploy-test:
    needs: build
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Apply manifests
        run: kubectl apply -k k8s/overlays/test
      - name: Update image tags
        run: |
          SHA=${{ needs.build.outputs.sha }}
          kubectl set image deployment/api api=gcr.io/${{ env.PROJECT_ID }}/checkout-backend:$SHA -n test
          kubectl set image deployment/frontend frontend=gcr.io/${{ env.PROJECT_ID }}/checkout-frontend:$SHA -n test
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api -n test --timeout=5m
          kubectl rollout status deployment/frontend -n test --timeout=5m

  deploy-prod:
    needs: build
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Apply manifests
        run: kubectl apply -k k8s/overlays/prod
      - name: Update image tags
        run: |
          SHA=${{ needs.build.outputs.sha }}
          kubectl set image deployment/api api=gcr.io/${{ env.PROJECT_ID }}/checkout-backend:$SHA -n prod
          kubectl set image deployment/frontend frontend=gcr.io/${{ env.PROJECT_ID }}/checkout-frontend:$SHA -n prod
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api -n prod --timeout=10m
          kubectl rollout status deployment/frontend -n prod --timeout=10m